<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>嘉義方案｜活動期程與現金流儀表板</title>
  
  <!-- 引入 Tailwind CSS 進行快速樣式排版 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide Icons 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 引入 Chart.js 圖表庫 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8">
  
  <div class="max-w-5xl mx-auto space-y-8">
    
    <!-- 頂部資訊看板 -->
    <header class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="bg-indigo-600 p-6 md:p-8 text-white">
        <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-3">
          <i data-lucide="wallet" class="w-8 h-8"></i>
          嘉義方案｜工作期程與現金流儀表板
        </h1>
        <p class="mt-2 text-indigo-100 text-lg">零贊助 / 工作與財務雙軌並行版</p>
      </div>
      
      <div class="p-6 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-6 bg-white">
        <div class="p-4 rounded-xl border border-rose-100 bg-rose-50 flex flex-col justify-center">
          <div class="text-sm font-medium text-rose-600 mb-1">總預計支出 (P0+P1+P2)</div>
          <div class="text-2xl font-bold text-rose-700">NT$94,000</div>
        </div>
        <div class="p-4 rounded-xl border border-emerald-100 bg-emerald-50 flex flex-col justify-center">
          <div class="text-sm font-medium text-emerald-600 mb-1">總預計收入 (最保守票房)</div>
          <div class="text-2xl font-bold text-emerald-700">NT$97,000</div>
        </div>
        <div class="p-4 rounded-xl border border-indigo-100 bg-indigo-50 flex flex-col justify-center">
          <div class="text-sm font-medium text-indigo-600 mb-1">最終預計結餘</div>
          <div class="text-2xl font-bold text-indigo-700">NT$3,000</div>
        </div>
      </div>
    </header>

    <!-- 視覺化圖表區塊 (新增) -->
    <div class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-200">
      <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2 mb-6">
        <i data-lucide="bar-chart-3" class="w-6 h-6 text-indigo-600"></i>
        各階段資金水位圖 (我們何時缺錢？)
      </h2>
      <div class="w-full h-64 md:h-80 relative">
        <canvas id="cashFlowChart"></canvas>
      </div>
    </div>

    <!-- 結合工作排程的時間線區塊 -->
    <div class="space-y-6">
      <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2 px-2">
        <i data-lucide="calendar-check-2" class="w-6 h-6 text-indigo-600"></i>
        工作階段任務與現金流解析
      </h2>
      
      <!-- 動態生成時間線的容器 -->
      <div id="timeline-container" class="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
        <!-- 內容由下方 JavaScript 動態填入 -->
      </div>
    </div>

  </div>

  <!-- JavaScript 邏輯與數據資料 -->
  <script>
    // 金額格式化函數
    const formatCurrency = (amount) => {
      return new Intl.NumberFormat('zh-TW', {
        style: 'currency',
        currency: 'TWD',
        minimumFractionDigits: 0
      }).format(amount);
    };

    // 整合「工作統籌」與「財務」的數據
    const timelineData = [
      {
        id: 1,
        stage: '第一階段：籌備啟動期',
        time: '4月 ~ 5月上旬',
        goal: '團隊定案、產出視覺、搶下場地',
        warning: '團隊須先準備約 3 萬元代墊款，才能推進工作！',
        warningType: 'danger',
        tasks: [
          { date: '4/20', team: '統籌組', desc: '大會確認' },
          { date: '4/25', team: '行銷組', desc: '海報文案撰寫' },
          { date: '5/02', team: '行銷組', desc: '主視覺設計完成' },
          { date: '5/11', team: '企劃/營運', desc: '音樂會企劃與募款/財務計畫定案' }
        ],
        outflows: [
          { item: '場地租金與保證金 (P0)', amount: -25000 },
          { item: '主視覺海報設計訂金 (P2)', amount: -2500 }
        ],
        inflows: [],
        netFlow: -27500,
        cumulativeBalance: -27500
      },
      {
        id: 2,
        stage: '第二階段：早鳥預熱期',
        time: '5月中旬 ~ 6月',
        goal: '發布視覺，早鳥票開賣回血',
        warning: '早鳥票收入是補足前期代墊款的關鍵。',
        warningType: 'success',
        tasks: [
          { date: '5/04', team: '行銷組', desc: '發佈海報(主視覺)貼文' },
          { date: '5月中', team: '營運組', desc: '啟動早鳥售票與報名者匯款核銷' }
        ],
        outflows: [
          { item: '城市走訪合作訂金 (P0)', amount: -5000 },
          { item: '海報印刷尾款 (P2)', amount: -2500 }
        ],
        inflows: [
          { item: '早鳥票收入', amount: 45000, note: '目標 50 張' }
        ],
        netFlow: 37500,
        cumulativeBalance: 10000
      },
      {
        id: 3,
        stage: '第三階段：衝刺定案期',
        time: '6月 ~ 7月上旬',
        goal: '衝刺一般票房，確認硬體與保險名單',
        tasks: [
          { date: '6月', team: '統籌組', desc: '確認所有硬體設備規格與音樂老師聯繫' },
          { date: '7月上', team: '營運組', desc: '確認報名總名單並投保' }
        ],
        outflows: [
          { item: '保險費用 (P0)', amount: -5000 },
          { item: '音控設備訂金 (P1)', amount: -7500 }
        ],
        inflows: [
          { item: '一般單人/雙人票收入', amount: 52000, note: '單人10張 + 雙人20組' }
        ],
        netFlow: 39500,
        cumulativeBalance: 49500
      },
      {
        id: 4,
        stage: '第四階段：活動執行期',
        time: '7月中旬 ~ 7月底',
        goal: '嘉義活動正式登場，現場尾款結清',
        tasks: [
          { date: 'Day 1', team: '全體', desc: '進場拆裝、音樂會、晚會點心' },
          { date: 'Day 2', team: '全體', desc: '城市走訪執行' }
        ],
        outflows: [
          { item: '音控設備尾款 (P1)', amount: -17500 },
          { item: '城市走訪尾款 (P0)', amount: -12000 },
          { item: '晚會點心與表演者禮金', amount: -12000 },
          { item: '預備金動用 (P1)', amount: -15000, note: '抓最壞打算全用完' }
        ],
        inflows: [],
        netFlow: -56500,
        cumulativeBalance: -7000
      },
      {
        id: 5,
        stage: '第五階段：結案退款期',
        time: '8月 (活動後)',
        goal: '場地復原，財務總結算',
        tasks: [
          { date: '8月', team: '營運組', desc: '財務最終核銷與紀錄' }
        ],
        outflows: [],
        inflows: [
          { item: '場地保證金退還', amount: 10000 }
        ],
        netFlow: 10000,
        cumulativeBalance: 3000
      }
    ];

    // 動態渲染時間線 HTML
    const container = document.getElementById('timeline-container');
    let htmlContent = '';
    
    timelineData.forEach((stage, index) => {
      const isEven = index % 2 === 0;
      const rowReverseClass = !isEven ? 'md:flex-row-reverse' : '';
      const nodeTranslateClass = isEven ? 'md:translate-x-1/2' : 'md:-translate-x-1/2';
      
      let warningHtml = '';
      if (stage.warning) {
        const isDanger = stage.warningType === 'danger';
        const bgClass = isDanger ? 'bg-rose-50 text-rose-700 border-rose-100' : 'bg-emerald-50 text-emerald-700 border-emerald-100';
        const iconName = isDanger ? 'alert-triangle' : 'info';
        warningHtml = `
          <div class="p-3 rounded-lg text-sm mb-4 flex items-start gap-2 border ${bgClass}">
            <i data-lucide="${iconName}" class="w-5 h-5 shrink-0"></i>
            <span class="font-medium">${stage.warning}</span>
          </div>
        `;
      }

      // 渲染工作任務清單
      let tasksHtml = '';
      if (stage.tasks && stage.tasks.length > 0) {
        let items = stage.tasks.map(t => `
          <li class="flex items-start gap-2 text-sm text-slate-700 py-1 border-b border-slate-100 last:border-0">
            <span class="font-bold text-indigo-600 shrink-0 w-12">${t.date}</span>
            <span class="text-xs bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded shrink-0">${t.team}</span>
            <span>${t.desc}</span>
          </li>
        `).join('');
        tasksHtml = `
          <div class="mb-4 bg-slate-50 p-3 rounded-xl border border-slate-200">
            <h4 class="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1">
              <i data-lucide="check-square" class="w-4 h-4"></i> 工作重點
            </h4>
            <ul class="space-y-1">${items}</ul>
          </div>
        `;
      }

      // 資金流動 (縮減文字，直接並排顯示)
      let financeHtml = `
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="bg-rose-50/50 p-3 rounded-xl border border-rose-100">
             <div class="text-xs font-bold text-rose-500 mb-2 flex items-center gap-1"><i data-lucide="trending-down" class="w-3 h-3"></i> 花費</div>
             <div class="text-lg font-bold text-rose-700">${formatCurrency(stage.outflows.reduce((acc, curr) => acc + curr.amount, 0))}</div>
          </div>
          <div class="bg-emerald-50/50 p-3 rounded-xl border border-emerald-100">
             <div class="text-xs font-bold text-emerald-500 mb-2 flex items-center gap-1"><i data-lucide="trending-up" class="w-3 h-3"></i> 收入</div>
             <div class="text-lg font-bold text-emerald-700">${formatCurrency(stage.inflows.reduce((acc, curr) => acc + curr.amount, 0))}</div>
          </div>
        </div>
      `;

      // 結餘文字顏色
      const netFlowClass = stage.netFlow < 0 ? 'text-rose-600' : 'text-emerald-600';
      const cumBalanceClass = stage.cumulativeBalance < 0 ? 'text-rose-600' : 'text-indigo-600';
      const netFlowSign = stage.netFlow > 0 ? '+' : '';

      htmlContent += `
        <div class="relative flex items-center justify-between md:justify-normal ${rowReverseClass}">
          <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white bg-indigo-500 text-white shadow-md shrink-0 md:order-1 ${nodeTranslateClass} z-10">
            <span class="font-bold text-sm">${stage.id}</span>
          </div>
          
          <div class="w-[calc(100%-3rem)] md:w-[calc(50%-2.5rem)] bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:shadow-lg transition-all duration-300">
            <div class="flex justify-between items-start mb-3">
               <div>
                 <span class="inline-block px-2 py-1 bg-indigo-50 text-indigo-600 rounded-md text-xs font-bold w-max mb-1">${stage.time}</span>
                 <h3 class="text-lg font-bold text-slate-800">${stage.stage}</h3>
               </div>
            </div>

            ${warningHtml}
            ${tasksHtml}
            ${financeHtml}

            <div class="mt-2 pt-3 border-t border-slate-100 grid grid-cols-2 gap-4">
              <div>
                <div class="text-xs text-slate-500 mb-1 font-medium">當期淨流</div>
                <div class="text-sm font-bold ${netFlowClass}">${netFlowSign}${formatCurrency(stage.netFlow)}</div>
              </div>
              <div class="text-right">
                <div class="text-xs text-slate-500 mb-1 font-medium">階段累計結餘</div>
                <div class="text-lg font-bold ${cumBalanceClass}">${formatCurrency(stage.cumulativeBalance)}</div>
              </div>
            </div>
          </div>
        </div>
      `;
    });

    container.innerHTML = htmlContent;

    // 渲染 Lucide 圖示
    lucide.createIcons();

    // 初始化 Chart.js 圖表
    const ctx = document.getElementById('cashFlowChart').getContext('2d');
    
    // 準備圖表資料
    const labels = timelineData.map(d => d.time);
    const netFlows = timelineData.map(d => d.netFlow);
    const cumulativeBalances = timelineData.map(d => d.cumulativeBalance);

    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            type: 'bar',
            label: '當期淨現金流 (進帳-支出)',
            data: netFlows,
            backgroundColor: netFlows.map(val => val < 0 ? 'rgba(244, 63, 94, 0.7)' : 'rgba(16, 185, 129, 0.7)'),
            borderRadius: 6,
            order: 2
          },
          {
            type: 'line',
            label: '累計資金結餘 (我們的口袋剩多少)',
            data: cumulativeBalances,
            borderColor: '#4f46e5',
            backgroundColor: '#4f46e5',
            borderWidth: 3,
            tension: 0.3,
            pointBackgroundColor: '#fff',
            pointBorderColor: '#4f46e5',
            pointBorderWidth: 2,
            pointRadius: 5,
            order: 1
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'bottom',
            labels: { font: { family: 'sans-serif', size: 13 } }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                let label = context.dataset.label || '';
                if (label) { label += ': '; }
                if (context.parsed.y !== null) {
                  label += new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(context.parsed.y);
                }
                return label;
              }
            }
          }
        },
        scales: {
          y: {
            grid: { color: '#f1f5f9' },
            ticks: {
              callback: function(value) {
                return value === 0 ? 'NT$0' : value / 1000 + 'k';
              }
            }
          },
          x: {
            grid: { display: false }
          }
        }
      }
    });
  </script>
</body>
</html>
